name: API CI

on:
  pull_request:
    paths:
      - "apps/api/**"
      - ".github/workflows/api-ci.yml"
  push:
    branches: [main, dev]
    paths:
      - "apps/api/**"
      - ".github/workflows/api-ci.yml"

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install --no-cache-dir -e .[dev]
      - name: Ruff check
        run: python -m ruff check .
      - name: Type check
        run: python -m mypy app
      - name: Tests
        run: python -m pytest
