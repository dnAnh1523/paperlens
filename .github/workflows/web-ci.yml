name: Web CI

on:
  push:
    branches: [main, dev]
    paths:
      - "apps/web/**"
      - ".github/workflows/web-ci.yml"
  pull_request:
    paths:
      - "apps/web/**"
      - ".github/workflows/web-ci.yml"

permissions:
  contents: read

jobs:
  web-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install --fetch-timeout=120000 --fetch-retries=5

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build
